name: ci

# Guards the openâ†’proprietary boundary (and types) on every push to master and
# every PR â€” not just at release. `bun run lint` runs biome AND the
# dependency-cruiser boundary lint (`bun run boundary`), which is the
# load-bearing open-core guarantee: open SDK code must never import proprietary
# code. Without this, the boundary could silently regress on master between
# releases (the release workflow only checks it at tag time). Deliberately
# lightweight + deterministic (no test suite here â€” that runs in the release
# preflight; this gate is fast and flake-free so it can block every push/PR).

on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gate:
    name: lint + boundary + typecheck
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.2.0'
      - run: bun install --frozen-lockfile
      # `lint` = `biome check src tests && bun run boundary` (the boundary lint
      # runs under `bun --bun depcruise`, so the runner's system node version is
      # irrelevant â€” Bun's node-compat satisfies dependency-cruiser's engines).
      - run: bun run lint
      - run: bun run typecheck

  packages:
    name: open packages (build + canary + publish dry-run)
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    # Proves the open packages are consumable as PUBLISHED artifacts: build â†’
    # tarball-contents assertion â†’ install-from-tarball canary under both node
    # and bun â†’ publish dry-run. (The SDK core package + its canary/dry-run are
    # wired here in Phase 3, and the depcruise boundary rebase for
    # packages/sdk/src lands with the core move â€” protocol is a dep-less leaf.)
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.2.0'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: bun install --frozen-lockfile
      - run: bun run build:protocol
      - run: bun test packages/protocol/tests
      - run: bun run canary
      - name: protocol publish dry-run
        run: cd packages/protocol && npm publish --dry-run
