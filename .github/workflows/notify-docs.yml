name: Notify docs repo of harness changes

on:
  push:
    branches: [master]
    paths:
      - CHANGELOG.md
      - DECISIONS.md
      - README.md

concurrency:
  group: notify-docs
  cancel-in-progress: false

jobs:
  notify:
    runs-on: ubuntu-latest
    # Skip if the commit is from a bot or explicitly opted out.
    if: |
      !contains(github.event.head_commit.message, '[skip notify]') &&
      github.event.head_commit.committer.email != 'harness-sync-bot@users.noreply.github.com'
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 2

      - name: Extract change summary
        id: extract
        run: |
          set -e

          # Detect which files changed.
          changelog_changed=$(git diff --name-only HEAD~1 HEAD -- CHANGELOG.md | wc -l | tr -d ' ')
          decisions_changed=$(git diff --name-only HEAD~1 HEAD -- DECISIONS.md | wc -l | tr -d ' ')
          readme_changed=$(git diff --name-only HEAD~1 HEAD -- README.md | wc -l | tr -d ' ')

          if [ "$changelog_changed" = "0" ] && [ "$decisions_changed" = "0" ] && [ "$readme_changed" = "0" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "→ No CHANGELOG/DECISIONS/README changes in this push; skipping."
            exit 0
          fi
          echo "skip=false" >> "$GITHUB_OUTPUT"

          commit_sha=$(git rev-parse --short HEAD)
          commit_msg=$(git log -1 --format='%s' HEAD)
          commit_date=$(date -u +%Y-%m-%d)
          changed_files=$(git diff --name-only HEAD~1 HEAD | paste -sd ',' -)

          # Extract new CHANGELOG content (lines added in the diff, minus diff markers).
          changelog_delta=""
          if [ "$changelog_changed" != "0" ]; then
            changelog_delta=$(git diff HEAD~1 HEAD -- CHANGELOG.md | grep '^+' | grep -v '^+++' | sed 's/^+//' | head -20)
          fi

          # Extract new DECISIONS content.
          decisions_delta=""
          if [ "$decisions_changed" != "0" ]; then
            decisions_delta=$(git diff HEAD~1 HEAD -- DECISIONS.md | grep '^+' | grep -v '^+++' | sed 's/^+//' | head -10)
          fi

          # Extract test count from the README status section if present.
          test_count=$(grep -oP '\d+/\d+ tests' README.md | head -1 || echo "unknown")

          # Write to environment file for the next step.
          {
            echo "COMMIT_SHA=$commit_sha"
            echo "COMMIT_MSG=$commit_msg"
            echo "COMMIT_DATE=$commit_date"
            echo "CHANGED_FILES=$changed_files"
            echo "CHANGELOG_CHANGED=$changelog_changed"
            echo "DECISIONS_CHANGED=$decisions_changed"
            echo "TEST_COUNT=$test_count"
          } >> "$GITHUB_ENV"

          # Write multi-line deltas to files for the append step.
          echo "$changelog_delta" > /tmp/changelog_delta.txt
          echo "$decisions_delta" > /tmp/decisions_delta.txt

      - name: Clone docs repo and append queue entry
        if: steps.extract.outputs.skip != 'true'
        env:
          DOCS_REPO_TOKEN: ${{ secrets.DOCS_REPO_TOKEN }}
        run: |
          set -e

          if [ -z "$DOCS_REPO_TOKEN" ]; then
            echo "⚠ DOCS_REPO_TOKEN secret not set — cannot push to docs repo."
            echo "  To enable: create a GitHub PAT with repo scope, add it as"
            echo "  a secret named DOCS_REPO_TOKEN in sovereign-ai-harness settings."
            exit 0
          fi

          git clone --depth 1 "https://x-access-token:${DOCS_REPO_TOKEN}@github.com/yevgetman/sovereign-ai-docs.git" /tmp/docs-repo

          queue_file="/tmp/docs-repo/state/feed/harness-sync-queue.md"

          # Build the entry.
          entry="## ${COMMIT_DATE} — ${COMMIT_MSG}

- **source_commit:** ${COMMIT_SHA}
- **changed_files:** ${CHANGED_FILES}
- **test_count:** ${TEST_COUNT}"

          if [ "$CHANGELOG_CHANGED" != "0" ]; then
            delta=$(cat /tmp/changelog_delta.txt | head -5)
            entry="${entry}
- **changelog_delta:** ${delta}"
          fi

          if [ "$DECISIONS_CHANGED" != "0" ]; then
            delta=$(cat /tmp/decisions_delta.txt | head -5)
            entry="${entry}
- **decisions_delta:** ${delta}"
          fi

          entry="${entry}
- **status:** pending
"

          # Append after the frontmatter separator (first ---\n\n block).
          # Insert the new entry after the header section.
          if [ -f "$queue_file" ]; then
            # Find the line number of the second "---" (end of header).
            header_end=$(grep -n '^---$' "$queue_file" | tail -1 | cut -d: -f1)
            if [ -n "$header_end" ]; then
              head -n "$header_end" "$queue_file" > /tmp/queue_new.md
              echo "" >> /tmp/queue_new.md
              echo "$entry" >> /tmp/queue_new.md
              tail -n +"$((header_end + 1))" "$queue_file" >> /tmp/queue_new.md
              mv /tmp/queue_new.md "$queue_file"
            else
              echo "$entry" >> "$queue_file"
            fi
          else
            echo "⚠ Queue file not found at $queue_file — skipping."
            exit 0
          fi

          cd /tmp/docs-repo
          git config user.name "harness-sync-bot"
          git config user.email "harness-sync-bot@users.noreply.github.com"
          git add state/feed/harness-sync-queue.md
          if git diff --cached --quiet; then
            echo "→ No queue changes to commit."
            exit 0
          fi
          git commit -m "chore(feed): harness change notification for ${COMMIT_SHA} [skip ci] [skip cascade]"

          attempt=0
          max_attempts=3
          until git push; do
            attempt=$((attempt + 1))
            if [ $attempt -ge $max_attempts ]; then
              echo "✖ push failed after $max_attempts attempts"
              exit 1
            fi
            git fetch origin master
            git rebase origin/master
          done

          echo "→ Queue entry appended for commit ${COMMIT_SHA}."
